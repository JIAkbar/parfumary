name       = "parfumary"
pages_build_output_dir = "."

# OWNER_KEY TIDAK didefinisikan di sini secara sengaja — kalau ada di [vars]
# (plaintext, ikut ke git), Cloudflare mengunci nama itu jadi tidak bisa
# di-set sebagai Secret via dashboard. Tambahkan OWNER_KEY sebagai SECRET
# langsung di CF Pages dashboard → Settings → Environment variables → Add
# secret. Untuk dev lokal, isi di file .dev.vars (gitignored, lihat
# .dev.vars.example).

[[d1_databases]]
binding      = "DB"          # env.DB di dalam Worker
database_name = "parfumary-db"
database_id  = "9443e6e6-3a39-49ce-ac47-63a31c4bc033"
